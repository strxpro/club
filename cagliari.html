<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/LOGO%20CAGLIARI%20CLUB%20PNG-OK.png">
    <link rel="apple-touch-icon" href="/images/LOGO%20CAGLIARI%20CLUB%20PNG-OK.png">
    <link rel="manifest" href="/images/favicon/site.webmanifest">
    <title>Cagliari Calcio - Strefa Kibica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0b132b',
                        'navy-light': '#14224a',
                        'navy-dark': '#060d1e',
                        crimson: '#c8102e',
                    },
                    fontFamily: {
                        heading: ['"Bebas Neue"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060d1e;
            color: rgba(255, 255, 255, 0.85);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        h1, h2, h3, h4, .font-heading {
            font-family: 'Bebas Neue', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }
        .live-pulse {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(200, 16, 46, 1); box-shadow: 0 0 15px rgba(200, 16, 46, 0.5); }
            50% { border-color: rgba(200, 16, 46, 0.4); box-shadow: 0 0 5px rgba(200, 16, 46, 0.1); }
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #c8102e;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .cagliari-row {
            background: rgba(200, 16, 46, 0.15) !important;
            border-left: 4px solid #c8102e;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(200,16,46,0.4); border-radius: 4px; }

        /* Custom Dropdown Glassmorphism */
        .season-dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            min-width: 240px;
            background: linear-gradient(180deg, rgba(20, 34, 74, 0.95) 0%, rgba(6, 13, 30, 0.96) 100%);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.45);
            z-index: 100;
            overflow: hidden;
            padding: 8px;
            animation: fadeInDown 0.3s ease-out;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translate(-50%, -10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        .season-dropdown.active .season-dropdown-content { display: block; }
        .season-dropdown.active #season-trigger {
            border-color: rgba(200, 16, 46, 0.45);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 1px rgba(200, 16, 46, 0.15), 0 14px 30px rgba(0,0,0,0.35);
        }
        .season-dropdown.active #season-trigger svg { transform: rotate(180deg); color: rgba(255,255,255,0.95); }
        .season-option { border-radius: 14px; }
        .season-option:hover { background: rgba(200, 16, 46, 0.16); color: rgba(255, 255, 255, 1); }

        /* Fixtures Carousel Improvements */
        #calendar-matches {
            scroll-behavior: smooth;
        }

        .stats-table {
            min-width: 580px;
        }

        .match-card-panel,
        .match-card-side,
        .squad-player-meta,
        .squad-player-card {
            min-width: 0;
        }

        .match-score-shell {
            width: 100%;
            max-width: 360px;
        }

        .squad-player-name {
            word-break: break-word;
        }

        @media (max-width: 1023px) {
            .match-live-layout,
            .match-next-layout {
                flex-direction: column;
                align-items: center;
            }

            .match-next-layout .match-card-side,
            .match-next-layout .match-card-side--away {
                align-items: center !important;
                text-align: center !important;
            }
        }

        @media (max-width: 767px) {
            .stats-table {
                min-width: 540px;
            }

            .match-live-heading {
                letter-spacing: 0.12em;
            }

            .match-live-team-title {
                font-size: clamp(1.85rem, 8vw, 3rem);
            }

            .match-score-text {
                font-size: clamp(3.4rem, 15vw, 5rem);
            }

            .match-next-date {
                font-size: clamp(2.6rem, 11vw, 3.75rem);
            }

            .match-next-opponent {
                font-size: clamp(1.75rem, 8vw, 2.5rem);
            }

            .squad-player-card {
                align-items: flex-start;
                gap: 1rem;
            }

            .squad-player-number {
                align-self: flex-end;
                padding-right: 0;
            }
        }
        
    </style>
</head>
<body class="bg-navy-dark overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none z-[-1]" style="background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20, 34, 74, 0.5) 0%, transparent 50%), radial-gradient(ellipse 70% 50% at 20% 70%, rgba(20, 34, 74, 0.3) 0%, transparent 50%);"></div>

    <!-- REACT NAVBAR MOUNT -->

    <main class="container-main mt-28 md:mt-32 xl:mt-40 space-y-8 md:space-y-12 relative z-10 flex-grow pb-20 md:pb-24">
        
        <!-- HEADER -->
        <header class="text-center space-y-6 flex flex-col items-center">
            <!-- CUSTOM SEASON SELECTOR -->
            <div class="relative inline-block season-dropdown" id="season-dropdown">
                <button id="season-trigger" type="button" aria-haspopup="listbox" aria-expanded="false" class="flex items-center justify-between gap-4 min-w-[240px] px-7 py-3.5 rounded-[20px] border border-white/10 bg-white/5 text-xs font-bold tracking-[0.24em] text-white hover:bg-white/10 transition-all uppercase shadow-[0_14px_35px_rgba(0,0,0,0.25)] group">
                    <span id="current-season-label">SEZON 2024 / 25</span>
                    <svg class="w-4 h-4 text-white/40 group-hover:text-crimson transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>

                    <div class="season-option px-5 py-3.5 cursor-pointer text-white hover:text-white transition-all font-bold bg-white/5 flex items-center justify-between" data-value="2025">SEZON 2025 / 26</div>

            <h2 class="text-4xl sm:text-5xl md:text-8xl font-heading text-white tracking-[0.14em] md:tracking-widest uppercase mt-4 leading-none" data-i18n="cagliari_stats_title">

        <!-- LIVE MATCH / NEXT MATCH SECTION -->

        <!-- GRID SYSTEM -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 xl:gap-8">

                <div class="flex items-center justify-between mb-8 pb-3 border-b border-white/10">

                                <th class="py-3 px-2 font-semibold text-center" data-i18n="cagliari_table_played">M</th>
                                <th class="py-3 px-2 font-semibold text-center" data-i18n="cagliari_table_record">Z-R-P</th>
                                <th class="py-3 px-2 font-semibold text-center" data-i18n="cagliari_table_goals">Gole</th>

                <div id="standings-error" class="hidden text-center py-8 text-white/40"></div>
            </section>

            <!-- RIGHT COLUMN: CALENDAR & LAST MATCH -->
            <div class="flex flex-col gap-8 h-full">
                <!-- CALENDAR / FIXTURES -->
                <section class="glass-card p-4 sm:p-6 md:p-8 flex flex-col flex-grow min-h-[420px] sm:min-h-[450px] relative">
                    <div class="flex items-center justify-between mb-6 border-b border-white/10 pb-4 shrink-0">

                        <div id="calendar-loader" class="loader scale-75"></div>

        <!-- SQUAD SECTION (LIST) -->

                <h3 class="text-3xl sm:text-4xl md:text-5xl font-heading text-white tracking-wider uppercase text-center w-full" data-i18n="cagliari_squad">Kadra Zespołu</h3>
                <div id="squad-loader" class="loader absolute right-4 sm:right-8"></div>
            </div>
            
            <div id="squad-container" class="w-full max-w-5xl mx-auto relative z-10 pb-10"></div>
        </section>

    </main>

    <!-- JS LOGIC -->
    <script>
        // CONFIGURATION
        const API_KEY = 'cef830252713a75968dd501948b06464';
        const USE_DEV_PROXY = ['localhost', '127.0.0.1'].includes(window.location.hostname) && window.location.port === '5173';
        const BASE_URL = USE_DEV_PROXY ? '/api/api-sports' : 'https://v3.football.api-sports.io';
        const FOOTBALL_DATA_API_KEY = 'c96cd633e2474963bd0512cde35d0324';
        const FOOTBALL_DATA_BASE_URL = USE_DEV_PROXY ? '/api/football-data/v4' : 'https://api.football-data.org/v4';
        const LEAGUE_ID = 135; 
        const LEAGUE_CODE = 'SA';
        const TEAM_ID = 104;   
        const API_SPORTS_TEAM_ID = 490;
        const CURRENT_SEASON = 2025;
        const AVAILABLE_SEASONS = [2024, CURRENT_SEASON];
        const LATEST_SEASON = CURRENT_SEASON;
        const LIVE_STATUSES = ['1H', '2H', 'HT', 'ET', 'BT', 'P', 'SUSP', 'INT', 'LIVE'];
        const UPCOMING_STATUSES = ['TBD', 'NS'];
        const FINISHED_STATUSES = ['FT', 'AET', 'PEN'];
        const STANDINGS_REFRESH_INTERVAL = 5 * 60 * 1000;
        let currentSeason = CURRENT_SEASON; 
        
        const headers = { "x-apisports-key": API_KEY };
        const footballDataHeaders = { "X-Auth-Token": FOOTBALL_DATA_API_KEY };
        const localeMap = { 'pl': 'pl-PL', 'it': 'it-IT', 'en': 'en-GB', 'de': 'de-DE', 'es': 'es-ES', 'fr': 'fr-FR' };
        let ALL_FIXTURES = [];
        let fixturesRefreshInterval = null;
        let standingsRefreshInterval = null;

        async function fetchFootballData(endpoint) {
            try {
                const response = await fetch(`${FOOTBALL_DATA_BASE_URL}${endpoint}`, { method: 'GET', headers: footballDataHeaders });
                const data = await response.json();
                console.log(data);

                if (!response.ok) {
                    throw new Error(data.message || `HTTP ${response.status}`);
                }

                return data;
            } catch (error) {
                console.error("Football-Data request failed:", endpoint, error);
                return null;
            }
        }

        async function fetchApiData(endpoint) {
            try {
                const response = await fetch(`${BASE_URL}${endpoint}`, { method: 'GET', headers });
                const data = await response.json();
                console.log(data);

                const apiErrorMessage = data.errors && Object.keys(data.errors).length > 0
                    ? Object.entries(data.errors)
                        .filter(([, value]) => value)
                        .map(([key, value]) => `${key}: ${value}`)
                        .join(' | ')
                    : '';

                if (!response.ok || apiErrorMessage) {
                    throw new Error(apiErrorMessage || data.message || `HTTP ${response.status}`);
                }

                if (data.response) {
                    return data.response;
                }

                throw new Error("Invalid Response");
            } catch (error) {
                console.error("API-Sports request failed:", endpoint, error);
                return null;
            }
        }

        function t(key, fallback = key) {
            if (window.getCagliariTranslation) return window.getCagliariTranslation(key, fallback);
            return fallback;
        }

        function getCurrentLang() {
            let storedLang = '';

            try {
                storedLang = window.localStorage?.getItem('appLanguage') || '';
            } catch (error) {
                storedLang = '';
            }

            const lang = (storedLang || window.__appLanguage || document.documentElement.lang || 'it').slice(0, 2).toLowerCase();
            return localeMap[lang] ? lang : 'it';
        }

        function getCurrentLocale() {
            return localeMap[getCurrentLang()] || 'it-IT';
        }

        const TEAM_NAME_SHORTCUTS = Object.freeze({
            'Cagliari Calcio': 'Cagliari',
            'FC Internazionale Milano': 'Inter',
            'Internazionale': 'Inter',
            'Inter Milan': 'Inter',
            'AC Milan': 'Milan',
            'Juventus FC': 'Juventus',
            'AS Roma': 'Roma',
            'SS Lazio': 'Lazio',
            'SSC Napoli': 'Napoli',
            'Atalanta BC': 'Atalanta',
            'ACF Fiorentina': 'Fiorentina',
            'Bologna FC 1909': 'Bologna',
            'Torino FC': 'Torino',
            'Genoa CFC': 'Genoa',
            'Parma Calcio 1913': 'Parma',
            'Como 1907': 'Como',
            'Udinese Calcio': 'Udinese',
            'US Lecce': 'Lecce',
            'Hellas Verona': 'Verona',
            'Hellas Verona FC': 'Verona',
            'Venezia FC': 'Venezia',
            'Empoli FC': 'Empoli',
            'US Sassuolo Calcio': 'Sassuolo',
            'US Cremonese': 'Cremonese',
            'Pisa SC': 'Pisa',
            'AC Monza': 'Monza'
        });

        function escapeHtml(value = '') {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getProfessionalTeamName(name = '') {
            const normalized = String(name || '').replace(/\s+/g, ' ').trim();

            if (!normalized) {
                return '';
            }

            if (TEAM_NAME_SHORTCUTS[normalized]) {
                return TEAM_NAME_SHORTCUTS[normalized];
            }

            const compactName = normalized
                .replace(/^(?:AS|AC|FC|SS|SSC|US|ACF)\s+/i, '')
                .replace(/(?:\s+(?:FC|CFC|BC|SC|SS|SSC|Calcio|Football Club|1909|1913|1907|1927))+$/gi, '')
                .replace(/\s+/g, ' ')
                .trim();

            return compactName || normalized;
        }

        function getSeasonRange(season = currentSeason) {
            const seasonStart = new Date(Date.UTC(season, 6, 1));
            const seasonEnd = new Date(Date.UTC(season + 1, 6, 1));
            const lastMatchday = new Date(Date.UTC(season + 1, 5, 30));

            return {
                startTimestamp: seasonStart.getTime(),
                endTimestamp: seasonEnd.getTime(),
                dateFrom: seasonStart.toISOString().slice(0, 10),
                dateTo: lastMatchday.toISOString().slice(0, 10)
            };
        }

        function formatSeasonLabel(season) {
            const suffix = String((season + 1) % 100).padStart(2, '0');
            return `${t('cagliari_season', 'Season').toUpperCase()} ${season} / ${suffix}`;
        }

        function updateSeasonDropdownUI() {
            label.innerText = formatSeasonLabel(currentSeason);
            options.forEach(opt => {
                const value = parseInt(opt.getAttribute('data-value'), 10);
                opt.innerText = formatSeasonLabel(value);
                opt.classList.toggle('font-bold', value === currentSeason);
                opt.classList.toggle('bg-white/5', value === currentSeason);
                opt.classList.toggle('text-white', value === currentSeason);
                opt.classList.toggle('text-white/70', value !== currentSeason);
            });
        }

        function getUpcomingFixtures() {
            return ALL_FIXTURES
                .filter(f => UPCOMING_STATUSES.includes(f.fixture.status.short) || f.fixture.status.long === 'Not Started')
                .sort((a, b) => a.fixture.timestamp - b.fixture.timestamp);
        }

        function getFinishedFixtures() {
            return ALL_FIXTURES
                .filter(f => FINISHED_STATUSES.includes(f.fixture.status.short) || f.fixture.status.long === 'Match Finished')
                .sort((a, b) => b.fixture.timestamp - a.fixture.timestamp);
        }

        function getCalendarFixtures() {
            return getUpcomingFixtures();
        }

        function getPositionMeta(position) {
            if (position === 'Goalkeeper') return { key: 'cagliari_goalkeepers', fallback: 'Goalkeepers', icon: '🧤' };
            if (position === 'Defender') return { key: 'cagliari_defenders', fallback: 'Defenders', icon: '🛡️' };
            if (position === 'Attacker') return { key: 'cagliari_attackers', fallback: 'Attackers', icon: '🎯' };
            return { key: 'cagliari_midfielders', fallback: 'Midfielders', icon: '⚙️' };
        }

        function mapFootballDataStatus(status) {
            if (status === 'IN_PLAY') return { short: 'LIVE', long: 'In Play' };
            if (status === 'PAUSED') return { short: 'HT', long: 'Paused' };
            if (status === 'FINISHED') return { short: 'FT', long: 'Match Finished' };
            if (status === 'TIMED' || status === 'SCHEDULED') return { short: 'NS', long: 'Not Started' };
            if (status === 'POSTPONED') return { short: 'PST', long: 'Postponed' };
            if (status === 'SUSPENDED') return { short: 'SUSP', long: 'Suspended' };
            return { short: status || 'NS', long: status || 'Unknown' };
        }

        function adaptFootballDataMatches(data) {
            if (!Array.isArray(data?.matches)) {
                return [];
            }

            const { startTimestamp, endTimestamp } = getSeasonRange(currentSeason);

            return data.matches
                .map(match => {
                    if (!match?.homeTeam || !match?.awayTeam || !match.utcDate) {
                        return null;
                    }

                    const matchTimestamp = new Date(match.utcDate).getTime();

                    if (Number.isNaN(matchTimestamp) || matchTimestamp < startTimestamp || matchTimestamp >= endTimestamp) {
                        return null;
                    }

                    const status = mapFootballDataStatus(match.status);
                    const score = match.score?.fullTime || {};

                    return {
                        fixture: {
                            id: match.id,
                            date: match.utcDate,
                            timestamp: Math.floor(matchTimestamp / 1000),
                            status: {
                                short: status.short,
                                long: status.long,
                                elapsed: typeof match.minute === 'number' ? match.minute : null
                            }
                        },
                        league: {
                            name: match.competition?.name || 'Serie A'
                        },
                        teams: {
                            home: {
                                id: match.homeTeam.id,
                                name: match.homeTeam.name,
                                logo: match.homeTeam.crest || ''
                            },
                            away: {
                                id: match.awayTeam.id,
                                name: match.awayTeam.name,
                                logo: match.awayTeam.crest || ''
                            }
                        },
                        goals: {
                            home: typeof score.home === 'number' ? score.home : 0,
                            away: typeof score.away === 'number' ? score.away : 0
                        }
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.fixture.timestamp - b.fixture.timestamp);
        }

        function adaptFootballDataStandings(data) {
            const standingsGroup = Array.isArray(data?.standings)
                ? (data.standings.find(group => group.type === 'TOTAL') || data.standings[0])
                : null;
            const table = Array.isArray(standingsGroup?.table) ? standingsGroup.table : [];

            return table.map(row => ({
                rank: row.position,
                team: {
                    id: row.team.id,
                    name: row.team.shortName || row.team.name,
                    logo: row.team.crest || ''
                },
                all: {
                    played: row.playedGames,
                    win: row.won,
                    draw: row.draw,
                    lose: row.lost,
                    goals: {
                        for: row.goalsFor,
                        against: row.goalsAgainst
                    }
                },
                points: row.points
            }));
        }

        function normalizeApiSportsSquadPlayers(squadData) {
            const rawPlayers = Array.isArray(squadData?.[0]?.players)
                ? squadData[0].players
                : (Array.isArray(squadData) ? squadData : []);

            return rawPlayers
                .map(entry => {
                    const player = entry.player || entry;
                    const fullName = player.name || [player.firstname, player.lastname].filter(Boolean).join(' ').trim();

                    if (!fullName) {
                        return null;
                    }

                    return {
                        id: player.id ?? entry.id ?? null,
                        fullName,
                        number: entry.number ?? player.number ?? null,
                        position: entry.position ?? player.position ?? 'Midfielder',
                        photo: player.photo ?? entry.photo ?? ''
                    };
                })
                .filter(Boolean);
        }

        function getFixturesSignature(fixtures) {
            return JSON.stringify(
                (fixtures || []).map(f => `${f.fixture.id}:${f.fixture.status.short}:${f.goals.home ?? ''}:${f.goals.away ?? ''}`)
            );
        }

        async function refreshFixturesLiveState() {
            if (currentSeason !== LATEST_SEASON) return;

            const { dateFrom, dateTo } = getSeasonRange(currentSeason);
            const fixturesData = await fetchFootballData(`/teams/${TEAM_ID}/matches?dateFrom=${dateFrom}&dateTo=${dateTo}`);
            const freshFixtures = adaptFootballDataMatches(fixturesData);
            if (!freshFixtures || freshFixtures.length === 0) return;
            if (getFixturesSignature(freshFixtures) === getFixturesSignature(ALL_FIXTURES)) return;

            ALL_FIXTURES = freshFixtures;
            renderLiveAndNextMatch();
            renderLatestMatches();
            initCalendarUI();
        }

            if (fixturesRefreshInterval) {

            if (currentSeason !== LATEST_SEASON) return;

            fixturesRefreshInterval = window.setInterval(refreshFixturesLiveState, 60000);

        function manageStandingsRefresh() {
            if (standingsRefreshInterval) {
                clearInterval(standingsRefreshInterval);

        function initCalendarUI() {
            const calendarFixtures = getCalendarFixtures();
            let monthsToRender = new Set();
            calendarFixtures.forEach(f => monthsToRender.add(new Date(f.fixture.date).getMonth()));
            let monArr = Array.from(monthsToRender).sort((a,b) => a-b);
            
            const container = document.getElementById('cal-months');
            let html = '';
            monArr.forEach(m => {
                html += `<button onclick="changeMonth(${m})" id="btn-month-${m}" class="px-6 py-2.5 rounded-xl text-[10px] font-black tracking-widest transition-all shrink-0 bg-white/5 text-white/30 hover:bg-white/10 hover:text-white uppercase" data-i18n-month="${m}" data-i18n-short></button>`;
            });
            container.innerHTML = html;

            if (calendarFixtures.length === 0 || monArr.length === 0) {
                window.activeCalendarMonth = null;
                document.getElementById('calendar-matches').innerHTML = `<p class="text-center text-white/40 text-sm mt-4" data-i18n="cagliari_no_schedule">${t('cagliari_no_schedule', 'No schedule available.')}</p>`;
                document.getElementById('cal-prev').onclick = null;
                document.getElementById('cal-next').onclick = null;
                if(window.applyCagliariTranslations) window.applyCagliariTranslations();
                return;
            }
            
            const currM = new Date().getMonth();
            const activeM = typeof window.activeCalendarMonth === 'number' && monArr.includes(window.activeCalendarMonth)
                ? window.activeCalendarMonth
                : (monArr.includes(currM) ? currM : (monArr.length > 0 ? monArr[0] : 0));
            
            // Arrows logic
            document.getElementById('cal-prev').onclick = () => {
                const idx = monArr.indexOf(window.activeCalendarMonth);
                if(idx > 0) changeMonth(monArr[idx-1]);
            };
            document.getElementById('cal-next').onclick = () => {
                const idx = monArr.indexOf(window.activeCalendarMonth);
                if(idx < monArr.length - 1) changeMonth(monArr[idx+1]);
            };

            if(monArr.length > 0) changeMonth(activeM);
            if(window.applyCagliariTranslations) window.applyCagliariTranslations();
        }

        window.changeMonth = function(month) {
            window.activeCalendarMonth = month;
            document.querySelectorAll('#cal-months button').forEach(b => {
                b.classList.remove('bg-crimson', 'text-white', 'shadow-[0_0_15px_rgba(200,16,46,0.4)]', 'scale-110');
                b.classList.add('bg-white/5', 'text-white/30');
            });
            const btn = document.getElementById(`btn-month-${month}`);
            if(btn) {
                btn.classList.add('bg-crimson', 'text-white', 'shadow-[0_0_15px_rgba(200,16,46,0.4)]', 'scale-110');
                btn.classList.remove('bg-white/5', 'text-white/30');
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const container = document.getElementById('calendar-matches');
            const currentLocale = getCurrentLocale();

            const calendarFixtures = getCalendarFixtures();
            const matchesInMonth = calendarFixtures.filter(f => new Date(f.fixture.date).getMonth() === month).sort((a,b) => a.fixture.timestamp - b.fixture.timestamp);

            if(matchesInMonth.length === 0){
                container.innerHTML = `<p class="text-center text-white/40 mt-12 py-8 italic font-light tracking-widest uppercase">${t('cagliari_no_matches_in_month', 'No matches.')}</p>`;
                return;
            }
            
            let html = '';
            matchesInMonth.forEach(f => {
                const mDate = new Date(f.fixture.date);
                const d = mDate.getDate().toString().padStart(2, '0');
                const timeText = mDate.toLocaleTimeString(currentLocale, { hour: '2-digit', minute: '2-digit' });
                const homeFullName = escapeHtml(f.teams.home.name);
                const awayFullName = escapeHtml(f.teams.away.name);
                const homeDesktopName = escapeHtml(getProfessionalTeamName(f.teams.home.name));
                const awayDesktopName = escapeHtml(getProfessionalTeamName(f.teams.away.name));

                html += `
                    <div class="relative flex items-center justify-between p-4 sm:p-5 rounded-2xl border border-white/5 bg-white/5 hover:bg-white/10 transition-all group shrink-0 shadow-lg gap-4 lg:gap-5 xl:gap-6">
                        <div class="flex flex-col items-center w-[78px] sm:w-[22%] lg:w-[92px] xl:w-[104px] border-r border-white/10 pr-3 sm:pr-4 shrink-0">
                            <span class="font-heading text-2xl text-white tracking-widest leading-none mb-1">${d}</span>
                            <span class="text-[9px] text-white/30 font-black tracking-[0.2em] uppercase" data-i18n-month="${month}" data-i18n-short></span>
                            <span class="text-[10px] text-crimson font-black tracking-widest mt-2">${timeText}</span>
                        </div>
                        <div class="flex items-center justify-between gap-2 sm:gap-4 lg:gap-5 flex-1 min-w-0 pl-1 sm:pl-4 lg:pl-5">
                            <div class="flex flex-col items-center flex-1 gap-2 lg:gap-3 min-w-0 group/team">
                                <img src="${f.teams.home.logo}" class="w-10 h-10 lg:w-11 lg:h-11 xl:w-12 xl:h-12 object-contain group-hover/team:scale-125 transition-transform" title="${homeFullName}" alt="${homeFullName}">
                                <span class="block lg:hidden text-[10px] sm:text-[11px] uppercase tracking-[0.08em] sm:tracking-[0.14em] text-white/60 text-center leading-tight whitespace-normal break-words w-full px-1">${homeFullName}</span>
                                <span class="hidden lg:flex text-[12px] xl:text-[13px] uppercase tracking-[0.08em] xl:tracking-[0.12em] text-white/75 text-center whitespace-normal break-words w-full px-2" style="max-width: 160px; min-height: 2.6rem; line-height: 1.25; margin: 0 auto; align-items: center; justify-content: center;" title="${homeFullName}">${homeDesktopName}</span>
                            </div>
                            <div class="flex flex-col items-center justify-center shrink-0 min-w-[44px] sm:min-w-[80px]">
                                <span class="text-white/10 font-black text-xl tracking-[0.3em] uppercase">VS</span>
                            </div>
                            <div class="flex flex-col items-center flex-1 gap-2 lg:gap-3 min-w-0 group/team">
                                <img src="${f.teams.away.logo}" class="w-10 h-10 lg:w-11 lg:h-11 xl:w-12 xl:h-12 object-contain group-hover/team:scale-125 transition-transform" title="${awayFullName}" alt="${awayFullName}">
                                <span class="block lg:hidden text-[10px] sm:text-[11px] uppercase tracking-[0.08em] sm:tracking-[0.14em] text-white/60 text-center leading-tight whitespace-normal break-words w-full px-1">${awayFullName}</span>
                                <span class="hidden lg:flex text-[12px] xl:text-[13px] uppercase tracking-[0.08em] xl:tracking-[0.12em] text-white/75 text-center whitespace-normal break-words w-full px-2" style="max-width: 160px; min-height: 2.6rem; line-height: 1.25; margin: 0 auto; align-items: center; justify-content: center;" title="${awayFullName}">${awayDesktopName}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
            if(window.applyCagliariTranslations) window.applyCagliariTranslations();
        };

        function dedupeSquadPlayers(players) {
            const seen = new Set();

            return players.filter(player => {
                const key = player.id != null
                    ? `id:${player.id}`
                    : `name:${(player.fullName || '').trim().toLowerCase()}`;

                if (!key || seen.has(key)) {
                    return false;
                }

                seen.add(key);
                return true;
            });
        }

        function sortSquadPlayers(players) {
            const posOrder = { 'Goalkeeper': 1, 'Defender': 2, 'Midfielder': 3, 'Attacker': 4 };

            return [...players].sort((a, b) => {
                const positionA = posOrder[a.position] ?? 99;
                const positionB = posOrder[b.position] ?? 99;

                if (positionA !== positionB) {
                    return positionA - positionB;
                }

                const numberA = a.number ?? 999;
                const numberB = b.number ?? 999;

                if (numberA !== numberB) {
                    return numberA - numberB;
                }

                return a.fullName.localeCompare(b.fullName);
            });
        }

        function splitSquadPlayers(players) {
            let pool = sortSquadPlayers(dedupeSquadPlayers(players));
            const takeByPosition = (position, count) => {
                const picked = [];
                const remaining = [];

                pool.forEach(player => {
                    if (player.position === position && picked.length < count) {
                        picked.push(player);
                        return;
                    }

                    remaining.push(player);
                });

                pool = remaining;
                return picked;
            };

            const mainSquad = [
                ...takeByPosition('Goalkeeper', 1),
                ...takeByPosition('Defender', 4),
                ...takeByPosition('Midfielder', 3),
                ...takeByPosition('Attacker', 3)
            ];

            if (mainSquad.length < 11) {
                mainSquad.push(...pool.splice(0, Math.min(11 - mainSquad.length, pool.length)));
            }

            const reserves = pool.splice(0, Math.min(9, pool.length));
            const remainingPlayers = pool;

            return {
                mainSquad: sortSquadPlayers(mainSquad),
                reserves: sortSquadPlayers(reserves),
                remainingPlayers: sortSquadPlayers(remainingPlayers)
            };
        }

        // 4. KADRA ZESPOŁU (LISTA Z PEŁNYMI IMIONAMI I PODZIAŁEM NA GŁÓWNĄ I REZERWY)
        async function loadSquad() {
            document.getElementById('squad-loader').style.display = 'block';
            const container = document.getElementById('squad-container');

            try {
                const squadData = await fetchApiData(`/players/squads?team=${API_SPORTS_TEAM_ID}`);
                const mergedSquad = normalizeApiSportsSquadPlayers(squadData)
                    .map((player, index) => ({
                        id: player.id ?? index,
                        number: player.number ?? null,
                        position: player.position || 'Midfielder',
                        photo: player.photo || '',
                        fullName: player.fullName || `Player ${index + 1}`
                    }));

                if (mergedSquad.length === 0) {
                    document.getElementById('squad-loader').style.display = 'none';
                    container.innerHTML = `<div class="w-full text-center py-20 text-white/50 bg-black/50 rounded-lg z-50" data-i18n="cagliari_squad_unavailable">${t('cagliari_squad_unavailable', 'Squad is not available for this request.')}</div>`;
                    if(window.applyCagliariTranslations) window.applyCagliariTranslations();
                    return;
                }

                const { mainSquad, reserves, remainingPlayers } = splitSquadPlayers(mergedSquad);

                // Render function for a group of players with improved translation support
                const renderGroup = (players, titleKey, titleFallback, useDivider = false) => {
                    if(players.length === 0) return '';
                    
                    const sortedPlayers = sortSquadPlayers(players);

                    const headerHtml = useDivider
                        ? `
                            <div class="relative flex items-center justify-center mb-8 pt-2">
                                <div class="absolute inset-x-0 h-px bg-gradient-to-r from-transparent via-white/15 to-transparent"></div>
                                <span class="relative px-5 py-2 rounded-full border border-white/10 bg-navy-dark text-[10px] font-bold tracking-[0.32em] uppercase text-white/60" data-i18n="${titleKey}">
                                    ${titleFallback}
                                </span>
                            </div>
                        `
                        : `
                            <h4 class="text-2xl sm:text-3xl font-heading text-white/90 tracking-widest uppercase mb-6 flex items-center gap-4" data-i18n="${titleKey}">
                                <span class="w-2 h-8 bg-crimson rounded-full shadow-[0_0_15px_#c8102e]"></span>
                                ${titleFallback}
                            </h4>
                        `;

                    let html = `
                    <div class="w-full">
                        ${headerHtml}
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    `;
                    
                    sortedPlayers.forEach(p => {
                        const positionMeta = getPositionMeta(p.position);

                        html += `
                        <div class="squad-player-card flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white/5 hover:bg-crimson/5 transition-all border border-white/5 rounded-2xl group relative overflow-hidden gap-4">
                            <div class="absolute inset-0 bg-gradient-to-r from-crimson/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="flex items-center gap-4 sm:gap-6 relative z-10 min-w-0 w-full">
                                <div class="w-16 h-16 rounded-full overflow-hidden border-2 border-white/10 group-hover:border-crimson/50 transition-colors shrink-0 bg-white/5 shadow-2xl">
                                    <img src="${p.photo}" alt="${p.fullName}" loading="lazy" class="w-full h-full object-cover">
                                </div>
                                <div class="squad-player-meta flex flex-col border-l border-white/10 pl-4 sm:pl-6 min-w-0">
                                    <span class="squad-player-name text-white font-heading text-lg sm:text-xl md:text-2xl tracking-[0.12em] sm:tracking-wider uppercase leading-tight">${p.fullName}</span>
                                    <span class="mt-2 inline-flex items-center gap-2 self-start rounded-full border border-white/10 bg-black/30 px-3 py-1">
                                        <span class="text-sm leading-none" aria-hidden="true">${positionMeta.icon}</span>
                                        <span class="text-white/60 text-[9px] sm:text-[10px] uppercase font-bold tracking-[0.2em] group-hover:text-white/80 transition-colors" data-i18n="${positionMeta.key}">${t(positionMeta.key, positionMeta.fallback)}</span>
                                    </span>
                                </div>
                            </div>
                            <div class="squad-player-number text-4xl sm:text-5xl text-crimson font-black font-heading opacity-20 flex items-baseline gap-1 group-hover:opacity-80 transition-all pr-0 sm:pr-4 relative z-10 self-end sm:self-auto">
                                ${p.number ? `
                                    <span class="text-sm text-white/20 font-light mr-0.5">#</span>
                                    <div>${p.number}</div>
                                ` : '-'}
                            </div>
                        </div>
                        `;
                    });
                    
                    html += `</div></div>`;
                    return html;
                };

                let finalHtml = '<div class="w-full flex flex-col gap-12">';
                finalHtml += renderGroup(mainSquad, 'cagliari_main_squad', t('cagliari_main_squad', 'Main Squad'));
                finalHtml += renderGroup(reserves, 'cagliari_reserves', t('cagliari_reserves', 'Reserves'), true);
                finalHtml += renderGroup(remainingPlayers, 'cagliari_remaining_players', t('cagliari_remaining_players', 'Remaining Players'), true);
                finalHtml += '</div>';
                
                container.innerHTML = finalHtml;
                document.getElementById('squad-loader').style.display = 'none';

                if(window.applyCagliariTranslations) {
                    window.applyCagliariTranslations();
                }

            } catch (err) {
                console.error(err);
                document.getElementById('squad-loader').style.display = 'none';
                container.innerHTML = `<div class="w-full text-center py-20 text-white/50 bg-black/50 rounded-lg z-50" data-i18n="cagliari_squad_error">${t('cagliari_squad_error', 'An error occurred while loading the squad. Please try again later.')}</div>`;
                if(window.applyCagliariTranslations) window.applyCagliariTranslations();
            }
        }

        function refreshTranslatedView() {
            updateSeasonDropdownUI();

            if(window.applyCagliariTranslations) {
                window.applyCagliariTranslations();
            }

            if (!ALL_FIXTURES.length) return;

            renderLiveAndNextMatch();
            renderLatestMatches();

            if (typeof window.activeCalendarMonth === 'number') {
                changeMonth(window.activeCalendarMonth);
            } else {
                initCalendarUI();
            }
        }

        window.addEventListener('appLanguageChanged', refreshTranslatedView);

        document.addEventListener('DOMContentLoaded', () => {
            refreshAllUI();
        });
    </script>
