<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cagliari Calcio - Strefa Kibica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#0b132b',
                        'navy-light': '#14224a',
                        'navy-dark': '#060d1e',
                        crimson: '#c8102e',
                    },
                    fontFamily: {
                        heading: ['"Bebas Neue"', 'sans-serif'],
                        body: ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060d1e;
            color: rgba(255, 255, 255, 0.85);
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4, .font-heading {
            font-family: 'Bebas Neue', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        .live-pulse {
            animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-border {
            0%, 100% { border-color: rgba(200, 16, 46, 1); box-shadow: 0 0 15px rgba(200, 16, 46, 0.5); }
            50% { border-color: rgba(200, 16, 46, 0.4); box-shadow: 0 0 5px rgba(200, 16, 46, 0.1); }
        }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #c8102e;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .cagliari-row {
            background: rgba(200, 16, 46, 0.15) !important;
            border-left: 4px solid #c8102e;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(200,16,46,0.4); border-radius: 4px; }

        /* PITCH CSS */
        .pitch {
            background: linear-gradient(0deg, rgba(34, 139, 34, 0.8) 0%, rgba(0, 100, 0, 0.9) 100%);
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 8px;
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .pitch::before {
            content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.6);
        }
        .pitch::after {
            content: ''; position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; 
            border: 2px solid rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%);
        }
        .penalty-box-top {
            position: absolute; top: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 120px; border: 2px solid rgba(255,255,255,0.6); border-top: 0;
        }
        .penalty-arc-top {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 40px; border: 2px solid rgba(255,255,255,0.6); border-top: 0; border-radius: 0 0 80px 80px;
        }
        .penalty-box-bottom {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 300px; height: 120px; border: 2px solid rgba(255,255,255,0.6); border-bottom: 0;
        }
        .penalty-arc-bottom {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 40px; border: 2px solid rgba(255,255,255,0.6); border-bottom: 0; border-radius: 80px 80px 0 0;
        }

        /* FUT CARD CSS */
        .fut-card {
            background: linear-gradient(135deg, #1a0505 0%, #c8102e 100%);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s ease;
        }
        .fut-card:hover {
            transform: scale(1.15);
            z-index: 50;
        }

    </style>
</head>
<body class="bg-navy-dark min-h-screen pb-24 relative overflow-x-hidden">

    <div class="fixed inset-0 pointer-events-none z-[-1]" style="background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(20, 34, 74, 0.5) 0%, transparent 50%), radial-gradient(ellipse 70% 50% at 20% 70%, rgba(20, 34, 74, 0.3) 0%, transparent 50%);"></div>

    <!-- REACT NAVBAR MOUNT -->
    <div id="cagliari-navbar-root"></div>

    <main class="container-main mt-32 xl:mt-40 space-y-10 relative z-10">
        
        <!-- HEADER -->
        <header class="text-center space-y-4 mb-4 flex flex-col items-center">
            <div class="relative inline-block w-48 mb-3">
                <select id="global-season-selector" class="w-full appearance-none px-6 py-2 rounded-full border border-white/10 bg-white/5 text-[11px] font-bold tracking-[0.2em] text-white/60 cursor-pointer outline-none hover:bg-white/10 hover:text-white transition-colors text-center uppercase">
                    <option value="2023" class="bg-navy-dark text-white/80">SEZON 2023 / 24</option>
                    <option value="2024" class="bg-navy-dark text-white/80" selected>SEZON 2024 / 25</option>
                    <option value="2025" class="bg-navy-dark text-white/80">SEZON 2025 / 26</option>
                </select>
                <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-white/40">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
            <h2 class="text-5xl md:text-7xl font-heading text-white tracking-widest uppercase mt-0" data-i18n="cagliari_stats_title">
                Aktualne <span class="text-crimson">Statystyki</span>
            </h2>
        </header>

        <!-- LIVE MATCH / NEXT MATCH SECTION -->
        <section class="glass-card p-6 md:p-10 flex flex-col items-center relative overflow-hidden w-full border border-white/10">
            <div id="live-pulse-bg" class="absolute inset-0 bg-crimson/5 blur-3xl -z-10 animate-pulse hidden"></div>
            <div id="live-match-full" class="w-full flex flex-col items-center pb-4 pt-2">
                <!-- Content Injected via JS -->
            </div>
        </section>

        <!-- GRID SYSTEM -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- STANDINGS TABLE -->
            <section class="lg:col-span-2 glass-card p-6 md:p-8 flex flex-col relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-crimson/5 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
                <div class="flex items-center justify-between mb-8 pb-3 border-b border-white/10">
                    <h3 class="text-3xl font-heading text-white tracking-wide" data-i18n="cagliari_standings">Tabela Serie A</h3>
                    <div id="standings-loader" class="loader"></div>
                </div>
                <div class="overflow-x-auto pb-4">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead class="text-xs uppercase tracking-wider text-white/40 border-b border-white/5">
                            <tr>
                                <th class="py-3 px-3 font-semibold">Poz</th>
                                <th class="py-3 px-3 font-semibold">Klub</th>
                                <th class="py-3 px-2 font-semibold text-center">M</th>
                                <th class="py-3 px-2 font-semibold text-center">Z-R-P</th>
                                <th class="py-3 px-2 font-semibold text-center">Gole</th>
                                <th class="py-3 px-2 font-bold text-center text-crimson text-[13px]">Pkt</th>
                            </tr>
                        </thead>
                        <tbody id="standings-body" class="divide-y divide-white/5 text-white/80">
                            <!-- Injected rows -->
                        </tbody>
                    </table>
                </div>
                <div id="standings-error" class="hidden text-center py-8 text-white/40"></div>
            </section>

            <!-- RIGHT COLUMN: CALENDAR & LAST MATCH -->
            <div class="flex flex-col gap-8 h-full">
                <!-- CALENDAR -->
                <section class="glass-card p-6 md:p-8 flex flex-col flex-grow min-h-[400px]">
                    <div class="flex items-center justify-between mb-5 border-b border-white/10 pb-3 shrink-0">
                        <h3 class="text-2xl font-heading text-white tracking-wide uppercase">Terminarz</h3>
                        <div id="calendar-loader" class="loader scale-75"></div>
                    </div>
                    
                    <div class="flex flex-col gap-3 mb-4 shrink-0">
                        <div id="cal-months" class="flex overflow-x-auto hide-scrollbar gap-2 pb-2 border-b border-white/5">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    
                    <div id="calendar-matches" class="flex flex-col gap-3 overflow-y-auto custom-scroll pr-2 flex-grow min-h-[250px] bg-black/10 rounded-xl p-3 border border-white/5 relative">
                        <!-- Matches -->
                    </div>
                </section>

                <!-- LAST MATCH -->
                <section class="glass-card p-6 md:p-8 flex flex-col justify-center border border-white/10">
                    <h3 class="text-2xl font-heading text-white tracking-wide uppercase border-b border-white/10 pb-3 mb-6" data-i18n="cagliari_latest_match">Ostatni Mecz</h3>
                    <div id="last-match-highlight" class="flex flex-col items-center justify-center min-h-[140px] w-full">
                        <!-- Injected -->
                        <p class="text-white/40 text-sm">Ładowanie...</p>
                    </div>
                </section>
            </div>
        </div>

        <!-- SQUAD SECTION (FOOTBALL PITCH) -->
        <section class="glass-card p-6 md:p-10 relative overflow-hidden flex flex-col items-center w-full">
            <div class="flex items-center justify-between w-full mb-12 border-b border-white/10 pb-4">
                <h3 class="text-4xl md:text-5xl font-heading text-white tracking-wider uppercase text-center w-full" data-i18n="cagliari_squad">Kadra Zespołu</h3>
                <div id="squad-loader" class="loader absolute right-8"></div>
            </div>
            
            <div class="w-full max-w-4xl mx-auto pitch py-16 px-4 md:px-8 relative overflow-hidden flex flex-col justify-between space-y-8 md:space-y-12" style="min-height: 800px;">
                <!-- Pitch markings -->
                <div class="penalty-box-top pointer-events-none"></div>
                <div class="penalty-arc-top pointer-events-none"></div>
                <div class="penalty-box-bottom pointer-events-none"></div>
                <div class="penalty-arc-bottom pointer-events-none"></div>
                
                <!-- Squad injected structurally: Attackers -> Midfielders -> Defenders -> Goalkeepers -->
                <div id="squad-container" class="flex flex-col justify-between h-full bg-transparent w-full relative z-10 gap-8 h-full"></div>
            </div>
        </section>

    </main>

    <!-- JS LOGIC -->
    <script>
        // CONFIGURATION
        const API_KEY = 'cef830252713a75968dd501948b06464';
        const BASE_URL = 'https://v3.football.api-sports.io';
        const LEAGUE_ID = 135; 
        const TEAM_ID = 490;   
        let currentSeason = 2024; // DOMYŚLNY SEZON WG WYMAGAŃ UŻYTKOWNIKA
        const CACHE_TTL = 3 * 60 * 60 * 1000; 
        
        const headers = { "x-apisports-key": API_KEY };
        let ALL_FIXTURES = [];

        const MONTHS_PL_SHORT = ['STY', 'LUT', 'MAR', 'KWI', 'MAJ', 'CZE', 'LIP', 'SIE', 'WRZ', 'PAŹ', 'LIS', 'GRU'];
        const MONTHS_PL_FULL = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];

        async function fetchWithCache(endpoint, forceRefresh = false) {
            const cacheKey = `cagliari_cache_${endpoint}`;
            const cached = localStorage.getItem(cacheKey);
            
            if (cached && !forceRefresh) {
                try {
                    const { timestamp, data } = JSON.parse(cached);
                    if (Date.now() - timestamp < CACHE_TTL) return data;
                } catch(e) {}
            }
            try {
                const response = await fetch(`${BASE_URL}${endpoint}`, { method: 'GET', headers });
                const data = await response.json();
                if (data.errors && Object.keys(data.errors).length > 0) {
                    console.error("API Limit or Plan Error: ", data.errors);
                    throw new Error("API Error: " + JSON.stringify(data.errors));
                }
                if (data.response) {
                    localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: data.response }));
                    return data.response;
                }
                throw new Error("Invalid Response");
            } catch (error) {
                if (cached) return JSON.parse(cached).data;
                return null;
            }
        }

        // SEZON SELECTOR LOGIC
        document.getElementById('global-season-selector').addEventListener('change', (e) => {
            currentSeason = parseInt(e.target.value);
            
            // Pokaż loadery
            document.getElementById('standings-loader').style.display = 'block';
            document.getElementById('calendar-loader').style.display = 'block';
            document.getElementById('squad-loader').style.display = 'block';
            
            // Wyczyść stare dane z UI
            document.getElementById('standings-body').innerHTML = '';
            document.getElementById('calendar-matches').innerHTML = '';
            document.getElementById('last-match-highlight').innerHTML = '<p class="text-white/40 text-sm">Ładowanie...</p>';
            document.getElementById('live-match-full').innerHTML = '';
            document.getElementById('squad-container').innerHTML = '';
            document.getElementById('standings-error').classList.add('hidden');

            // Odśwież z wymuszonym pobraniem z pominięciem cache dla nowych sezonów
            loadAllData(true);
        });

        async function loadAllData(forceRefresh = false) {
            await Promise.allSettled([
                loadStandings(forceRefresh),
                loadFixtures(forceRefresh),
                loadSquad(forceRefresh)
            ]);
        }

        async function loadStandings(forceRefresh = false) {
            const data = await fetchWithCache(`/standings?season=${currentSeason}&league=${LEAGUE_ID}`, forceRefresh);
            const tbody = document.getElementById('standings-body');
            document.getElementById('standings-loader').style.display = 'none';

            if (!data || !data[0] || !data[0].league.standings[0]) {
                document.getElementById('standings-error').classList.remove('hidden');
                document.getElementById('standings-error').innerHTML = `Brak danych dla sezonu ${currentSeason}. (Możliwy błąd planu API lub brak danych).`;
                return;
            }

            const standings = data[0].league.standings[0];
            let html = '';
            
            standings.forEach(row => {
                const isCagliari = row.team.id === TEAM_ID;
                const rowClass = isCagliari ? 'cagliari-row' : 'hover:bg-white/5 transition-colors border-l-4 border-transparent';
                html += `
                    <tr class="${rowClass}">
                        <td class="py-3 px-3 text-white/70 ${isCagliari ? 'font-bold !text-white' : ''}">${row.rank}</td>
                        <td class="py-3 px-3 flex items-center gap-3">
                            <img src="${row.team.logo}" alt="${row.team.name}" class="w-6 h-6 object-contain">
                            <span class="${isCagliari ? 'font-bold text-white' : 'font-medium'}">${row.team.name}</span>
                        </td>
                        <td class="py-3 px-2 text-center text-white/50">${row.all.played}</td>
                        <td class="py-3 px-2 text-center text-white/60">${row.all.win}-${row.all.draw}-${row.all.lose}</td>
                        <td class="py-3 px-2 text-center text-white/50 tracking-wider">${row.all.goals.for}:${row.all.goals.against}</td>
                        <td class="py-3 px-2 text-center font-bold ${isCagliari ? 'text-white' : 'text-crimson'} text-[15px]">${row.points}</td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        async function loadFixtures(forceRefresh = false) {
            ALL_FIXTURES = await fetchWithCache(`/fixtures?team=${TEAM_ID}&season=${currentSeason}`, forceRefresh);
            document.getElementById('calendar-loader').style.display = 'none';

            if (!ALL_FIXTURES || ALL_FIXTURES.length === 0) {
                document.getElementById('last-match-highlight').innerHTML = `<p class="text-white/40 text-sm">Błąd API (Brak danych widocznych dla tego sezonu)</p>`;
                document.getElementById('live-match-full').innerHTML = `<p class="text-center text-white/40 text-lg font-light tracking-wide py-8"><span data-i18n="cagliari_no_upcoming">Brak dostępnych meczów dla sezonu</span> ${currentSeason}.</p>`;
                document.getElementById('calendar-matches').innerHTML = `<p class="text-center text-white/40 text-sm mt-4">Brak terminarza.</p>`;
                return;
            }

            initCalendarUI();
            renderLiveAndNextMatch();
            renderLastMatch();
        }

        function renderLastMatch() {
            // OSTATNI MECZ: DOKŁADNIE JEDEN, ABSOLUTNIE NAJNOWSZY ZAKOŃCZONY MECZ
            const finished = ALL_FIXTURES.filter(f => ['FT', 'AET', 'PEN', 'Match Finished'].includes(f.fixture.status.short) || f.fixture.status.long === 'Match Finished')
                            .sort((a,b) => b.fixture.timestamp - a.fixture.timestamp);
            const container = document.getElementById('last-match-highlight');
            if(finished.length > 0) {
                const f = finished[0];
                const date = new Date(f.fixture.date).toLocaleDateString('pl-PL', { day:'2-digit', month:'2-digit', year:'numeric' });
                container.innerHTML = `
                    <div class="text-[10px] sm:text-xs text-white/50 mb-7 tracking-widest uppercase text-center w-full">${date} &bull; ${f.league.name}</div>
                    <div class="flex items-center justify-between w-full max-w-sm mx-auto">
                        <div class="flex flex-col items-center flex-1">
                            <img src="${f.teams.home.logo}" class="w-16 h-16 sm:w-20 sm:h-20 mb-3 object-contain drop-shadow-lg scale-110" alt="Home">
                            <span class="text-sm font-bold text-center text-white/90 tracking-wide uppercase truncate w-full px-2" title="${f.teams.home.name}">${f.teams.home.name.substring(0,3)}</span>
                        </div>
                        <div class="text-5xl sm:text-6xl px-4 py-2 font-heading font-black text-white tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">${f.goals.home} - ${f.goals.away}</div>
                        <div class="flex flex-col items-center flex-1">
                            <img src="${f.teams.away.logo}" class="w-16 h-16 sm:w-20 sm:h-20 mb-3 object-contain drop-shadow-lg scale-110" alt="Away">
                            <span class="text-sm font-bold text-center text-white/90 tracking-wide uppercase truncate w-full px-2" title="${f.teams.away.name}">${f.teams.away.name.substring(0,3)}</span>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `<p class="text-white/40 text-sm">Brak rozegranych meczów w tym sezonie.</p>`;
            }
        }

        function renderLiveAndNextMatch() {
            const liveStatuses = ['1H', '2H', 'HT', 'ET', 'BT', 'P', 'SUSP', 'INT', 'LIVE'];
            const liveMatches = ALL_FIXTURES.filter(f => liveStatuses.includes(f.fixture.status.short));
            const container = document.getElementById('live-match-full');
            
            if (liveMatches.length === 0) {
                document.getElementById('live-pulse-bg').classList.add('hidden');
                
                // ZNALEŹĆ PIERWSZY NASTĘPNY MECZ (Not Started / NS / TBD)
                const upcoming = ALL_FIXTURES.filter(f => ['TBD', 'NS', 'Not Started'].includes(f.fixture.status.short) || f.fixture.status.long === 'Not Started')
                                .sort((a,b) => a.fixture.timestamp - b.fixture.timestamp);
                
                let nextMatchHtml = '';
                if(upcoming.length > 0) {
                    const next = upcoming[0];
                    const date = new Date(next.fixture.date);
                    const dStr = date.toLocaleDateString('pl-PL', { day: '2-digit', month: '2-digit', year: 'numeric' });
                    const tStr = date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
                    
                    const isOpponentHome = next.teams.home.id !== TEAM_ID;
                    const opponent = isOpponentHome ? next.teams.home : next.teams.away;

                    nextMatchHtml = `
                        <div class="mt-8 flex flex-col items-center w-full max-w-xl mx-auto border border-white/10 bg-black/40 p-6 rounded-2xl shadow-xl z-10 relative">
                            <h3 class="text-white/80 font-heading text-2xl tracking-widest uppercase mb-6 flex items-center gap-3">
                                <span class="w-2 h-2 bg-crimson rounded-full"></span> NAJBLIŻSZY MECZ
                            </h3>
                            <div class="flex items-center justify-between w-full">
                                <div class="flex flex-col flex-1 items-start justify-center">
                                    <span class="text-white/50 text-[10px] uppercase tracking-widest mb-1">${next.league.name}</span>
                                    <span class="text-white font-heading text-3xl md:text-4xl tracking-wide">${dStr}</span>
                                    <span class="text-crimson font-bold text-lg md:text-xl tracking-widest mt-1">${tStr}</span>
                                </div>
                                
                                <div class="text-white/20 text-4xl px-4 italic font-light">vs</div>
                                
                                <div class="flex flex-col flex-1 items-end justify-center text-right">
                                    <img src="${opponent.logo}" class="w-16 h-16 md:w-20 md:h-20 object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.1)] mb-2">
                                    <span class="text-white/90 font-bold uppercase tracking-wider text-sm md:text-base">${opponent.name}</span>
                                    <span class="text-white/40 text-[10px] uppercase tracking-widest mt-1">${isOpponentHome ? 'WYJAZD' : 'DOM'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = `
                    <div class="flex items-center justify-between w-full border-b border-white/10 pb-4 mb-4">
                        <h3 class="text-3xl md:text-4xl font-heading text-white tracking-widest uppercase flex items-center justify-center gap-4 w-full opacity-50">
                            <span class="w-3 h-3 bg-white/20 rounded-full"></span> 
                            <span data-i18n="cagliari_live_match">Mecz na żywo</span>
                        </h3>
                    </div>
                    <p class="text-center text-white/50 text-xl font-light tracking-wide py-4" data-i18n="cagliari_no_live_match">Aktualnie Cagliari nie rozgrywa żadnego spotkania.</p>
                    ${nextMatchHtml}
                `;
                return;
            }

            // JEST MECZ NA ZYWO
            const live = liveMatches[0];
            document.getElementById('live-pulse-bg').classList.remove('hidden');

            container.innerHTML = `
                <div class="flex items-center justify-between w-full border-b border-white/10 pb-4 mb-8">
                    <h3 class="text-3xl md:text-4xl font-heading text-white tracking-widest uppercase flex items-center justify-center gap-4 w-full">
                        <span class="w-3 h-3 bg-crimson rounded-full animate-pulse shadow-[0_0_10px_rgba(200,16,46,1)]"></span> 
                        <span data-i18n="cagliari_live_match">Mecz na żywo</span>
                    </h3>
                </div>
                
                <div class="flex flex-col items-center w-full px-4 sm:px-10">
                    <div class="bg-crimson/20 border border-crimson/50 text-white text-xs font-bold px-4 py-1.5 rounded-full mb-6 relative overflow-hidden group">
                        <span class="relative z-10 flex items-center gap-2">MINUTA: ${live.fixture.status.elapsed}'</span>
                        <div class="absolute inset-0 bg-crimson/40 -translate-x-full group-hover:animate-[slideRight_1.5s_infinite]"></div>
                    </div>
                    <div class="flex items-center justify-between w-full max-w-4xl mx-auto">
                        <div class="flex flex-col items-center flex-1 text-center">
                            <img src="${live.teams.home.logo}" class="relative w-20 h-20 md:w-32 md:h-32 mb-4 object-contain drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
                            <h4 class="font-heading text-2xl md:text-4xl text-white tracking-wider">${live.teams.home.name}</h4>
                        </div>
                        <div class="flex flex-col items-center flex-[0.5] shrink-0 text-center px-4 md:px-8">
                            <p class="text-white/40 text-[10px] sm:text-xs uppercase tracking-widest mb-2">${live.league.name}</p>
                            <div class="flex items-center gap-4 md:gap-8 bg-black/30 px-6 py-4 rounded-3xl border border-white/10 shadow-[inset_0_0_20px_rgba(0,0,0,0.5)]">
                                <span class="text-5xl md:text-7xl font-heading text-crimson drop-shadow-[0_0_15px_rgba(200,16,46,0.6)]">${live.goals.home ?? 0}</span>
                                <span class="text-3xl md:text-5xl font-heading text-white/20">:</span>
                                <span class="text-5xl md:text-7xl font-heading text-crimson drop-shadow-[0_0_15px_rgba(200,16,46,0.6)]">${live.goals.away ?? 0}</span>
                            </div>
                        </div>
                        <div class="flex flex-col items-center flex-1 text-center">
                            <img src="${live.teams.away.logo}" class="relative w-20 h-20 md:w-32 md:h-32 mb-4 object-contain drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]">
                            <h4 class="font-heading text-2xl md:text-4xl text-white tracking-wider">${live.teams.away.name}</h4>
                        </div>
                    </div>
                </div>
            `;
        }

        function initCalendarUI() {
            let monthsToRender = new Set();
            ALL_FIXTURES.forEach(f => monthsToRender.add(new Date(f.fixture.date).getMonth()));
            let monArr = Array.from(monthsToRender).sort((a,b) => a-b);
            
            const container = document.getElementById('cal-months');
            let html = '';
            monArr.forEach(m => {
                html += `<button onclick="changeMonth(${m})" id="btn-month-${m}" class="px-3 py-1.5 rounded-md text-xs font-bold transition-all shrink-0 bg-white/5 text-white/50 hover:bg-white/10 hover:text-white">${MONTHS_PL_SHORT[m]}</button>`;
            });
            container.innerHTML = html;
            
            const currM = new Date().getMonth();
            const activeM = monArr.includes(currM) ? currM : (monArr.length > 0 ? monArr[0] : 0);
            if(monArr.length > 0) changeMonth(activeM);
        }

        window.changeMonth = function(month) {
            document.querySelectorAll('#cal-months button').forEach(b => {
                b.classList.remove('bg-crimson', 'text-white', 'shadow-[0_0_10px_rgba(200,16,46,0.6)]');
                b.classList.add('bg-white/5', 'text-white/50');
            });
            const btn = document.getElementById(`btn-month-${month}`);
            if(btn) {
                btn.classList.add('bg-crimson', 'text-white', 'shadow-[0_0_10px_rgba(200,16,46,0.6)]');
                btn.classList.remove('bg-white/5', 'text-white/50');
            }

            const container = document.getElementById('calendar-matches');
            const todayStr = new Date().toISOString().split('T')[0];

            const matchesInMonth = ALL_FIXTURES.filter(f => new Date(f.fixture.date).getMonth() === month).sort((a,b) => a.fixture.timestamp - b.fixture.timestamp);

            if(matchesInMonth.length === 0){
                container.innerHTML = `<p class="text-center text-white/40 mt-4">Brak spotkań w tym miesiącu.</p>`;
                return;
            }
            
            let html = '';
            matchesInMonth.forEach(f => {
                const matchDate = new Date(f.fixture.date);
                const isToday = matchDate.toISOString().split('T')[0] === todayStr;
                const isLive = ['1H', '2H', 'HT', 'ET', 'BT', 'P', 'SUSP', 'INT', 'LIVE'].includes(f.fixture.status.short);
                const isFinished = ['FT', 'AET', 'PEN', 'Match Finished'].includes(f.fixture.status.short) || f.fixture.status.long === 'Match Finished';
                
                const d = matchDate.getDate().toString().padStart(2, '0');
                const t = matchDate.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });

                html += `
                    <div class="relative flex items-center justify-between p-3 rounded-xl border ${isToday || isLive ? 'border-crimson/60 bg-crimson/5 shadow-[0_4px_20px_rgba(200,16,46,0.15)]' : 'border-white/5 bg-black/20 hover:bg-white/5'} transition-all group shrink-0">
                        <div class="flex flex-col items-center w-[25%] px-1">
                            <span class="font-heading text-lg text-white/90 leading-none">${d}</span>
                            <span class="text-[9px] text-white/40 font-bold tracking-widest mt-0.5">${MONTHS_PL_SHORT[month]}</span>
                            <span class="text-[10px] text-crimson font-bold tracking-widest mt-1">${t}</span>
                        </div>
                        <div class="flex items-center justify-between gap-1 w-[75%] px-1 text-center">
                            <img src="${f.teams.home.logo}" class="w-8 h-8 object-contain" title="${f.teams.home.name}">
                            <div class="flex flex-col items-center justify-center w-[40%]">
                                ${isFinished || isLive
                                    ? `<span class="font-heading text-2xl text-white font-bold tracking-widest whitespace-nowrap">${f.goals.home} - ${f.goals.away}</span>` 
                                    : `<span class="text-white/20 font-bold text-base">- : -</span>`
                                }
                            </div>
                            <img src="${f.teams.away.logo}" class="w-8 h-8 object-contain" title="${f.teams.away.name}">
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        };

        // 4. KADRA ZESPOŁU (BOISKO + FIFA KARTY)
        async function loadSquad(forceRefresh = false) {
            const data = await fetchWithCache(`/players/squads?team=${TEAM_ID}`, forceRefresh); // Prawidłowy API-sports endpoint to players/squads
            document.getElementById('squad-loader').style.display = 'none';
            const container = document.getElementById('squad-container');

            if (!data || !data[0] || !data[0].players) {
                container.innerHTML = `<div class="w-full text-center py-20 text-white/50 bg-black/50 rounded-lg z-50">Brak dostępnej kadry dla tego zapytania.</div>`;
                return;
            }

            // GDD: Format the layout precisely as bottom-to-top pyramid: Goalkeepers, Defenders, Midfielders, Attackers.
            const groups = [
                { id: "Attackers", players: [] },
                { id: "Midfielders", players: [] },
                { id: "Defenders", players: [] },
                { id: "Goalkeepers", players: [] }
            ];

            data[0].players.forEach(p => {
                let pid = "Midfielders";
                if(p.position === 'Attacker') pid = 'Attackers';
                if(p.position === 'Defender') pid = 'Defenders';
                if(p.position === 'Goalkeeper') pid = 'Goalkeepers';
                groups.find(g => g.id === pid).players.push(p);
            });

            let html = '';
            groups.forEach(g => {
                if(g.players.length === 0) return;
                
                // Sort by number
                g.players.sort((a,b) => (a.number || 99) - (b.number || 99));

                html += `<div class="w-full flex flex-wrap justify-center items-center gap-3 sm:gap-4 md:gap-6 lg:gap-8 z-10 w-full px-2">`;
                
                g.players.forEach(p => {
                    // EXACT RENDER FOR FIFA CARD AND <IMG SRC={player.photo} />
                    html += `
                        <div class="fut-card w-20 sm:w-24 md:w-28 lg:w-32 flex flex-col items-center py-2 px-1 relative">
                            <span class="absolute top-1 left-2 font-black text-white text-xs md:text-sm drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)]">${p.number || ''}</span>
                            <div class="w-10 h-10 sm:w-14 sm:h-14 md:w-16 md:h-16 lg:w-20 lg:h-20 bg-white/5 rounded-full overflow-hidden border-2 border-white/50 shadow-lg mt-3 mb-2 flex items-center justify-center">
                                <img src="${p.photo}" alt="${p.name}" loading="lazy" class="w-full h-full object-cover">
                            </div>
                            <span class="text-white text-[9px] sm:text-[10px] md:text-xs font-bold text-center w-full truncate px-1 uppercase tracking-tight drop-shadow-md">${p.name.split(' ').pop()}</span>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });
            
            container.innerHTML = html;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAllData(false); // Initially load from cache if valid. If user changes season, it skips cache.
        });
    </script>
    <!-- REACT FOOTER MOUNT -->
    <div id="cagliari-footer-root"></div>
    <script type="module" src="/src/cagliari.jsx"></script>
